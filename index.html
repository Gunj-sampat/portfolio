<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>My Whitespace</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=DM+Mono:wght@300;400&display=swap');

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:#06050e;
  color:#fff;
  font-family:'Cormorant Garamond', serif;
}

:root{
  --gold:#c8a97e;
  --rose:#c47a8a;
  --teal:#6ab4b4;
  --bright:#f2ece6;
  --dim:rgba(255,255,255,.35);
  --mono:'DM Mono', monospace;
}

canvas{
  position:absolute;
  inset:0;
}

#overlay{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  z-index:10;
  background:#06050e;
  transition:opacity 1s ease;
}

#overlay.hide{
  opacity:0;
  pointer-events:none;
}

.hero-line{
  font-size:clamp(1.2rem,2vw,1.8rem);
  line-height:2;
  color:var(--bright);
  opacity:0;
  animation:fadeUp 1s forwards;
}

.hero-line:nth-child(1){animation-delay:.5s}
.hero-line:nth-child(2){animation-delay:1.5s}
.hero-line:nth-child(3){animation-delay:2.5s}

.hero-line em{
  color:#9b8fc4;
  font-style:italic;
}

#enterBtn{
  margin-top:2rem;
  padding:1rem 2.8rem;
  border:1px solid rgba(200,169,126,.5);
  background:transparent;
  color:white;
  font-family:var(--mono);
  font-size:10px;
  letter-spacing:.35em;
  text-transform:uppercase;
  cursor:pointer;
  opacity:0;
  animation:fadeUp 1s forwards;
  animation-delay:3.4s;
  transition:.3s;
}

#enterBtn:hover{
  border-color:var(--gold);
  color:var(--gold);
}

#hud{
  position:absolute;
  inset:0;
  pointer-events:none;
  z-index:5;
}

.logo{
  position:absolute;
  top:24px;
  left:24px;
}

.logo h1{
  font-size:10px;
  letter-spacing:.35em;
  text-transform:uppercase;
  color:var(--gold);
  font-family:var(--mono);
}

.logo p{
  font-size:8px;
  letter-spacing:.15em;
  color:var(--dim);
  margin-top:5px;
  font-family:var(--mono);
}

.label{
  position:absolute;
  transform:translate(-50%,-100%);
  pointer-events:auto;
  text-align:center;
  opacity:0;
  transition:.5s;
  cursor:pointer;
}

.label.show{
  opacity:1;
}

.label .cat{
  font-size:8px;
  letter-spacing:.3em;
  text-transform:uppercase;
  font-family:var(--mono);
}

.label .name{
  font-size:1.2rem;
}

.label.energy{color:var(--gold)}
.label.matter{color:var(--rose)}
.label.fields{color:var(--teal)}

.panel{
  position:absolute;
  inset:0;
  background:#06050e;
  z-index:20;
  overflow:auto;
  padding:40px;
  display:none;
}

.panel.open{
  display:block;
}

.closeBtn{
  border:1px solid rgba(255,255,255,.2);
  background:none;
  color:white;
  padding:.6rem 1rem;
  cursor:pointer;
  margin-bottom:2rem;
  font-family:var(--mono);
  font-size:10px;
  letter-spacing:.2em;
  text-transform:uppercase;
}

.panelContent{
  max-width:1000px;
  margin:auto;
}

.panelTitle{
  font-size:4rem;
  font-weight:300;
  margin-bottom:1rem;
}

.panelText{
  font-size:1.1rem;
  line-height:1.9;
  color:rgba(255,255,255,.7);
}

.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:20px;
  margin-top:3rem;
}

.card{
  padding:2rem;
  border:1px solid rgba(255,255,255,.08);
  background:rgba(255,255,255,.02);
  transition:.3s;
}

.card:hover{
  border-color:rgba(200,169,126,.3);
  transform:translateY(-4px);
}

.card h3{
  margin-bottom:1rem;
  font-size:1.3rem;
  font-weight:400;
}

.card p{
  line-height:1.8;
  color:rgba(255,255,255,.65);
}

@keyframes fadeUp{
  from{
    opacity:0;
    transform:translateY(20px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}
</style>
</head>

<body>

<canvas id="c"></canvas>

<div id="overlay">
  <p class="hero-line">You are inside <em>a system of thought.</em></p>
  <p class="hero-line">Three forces hold the universe together —<br>energy, matter, and the fields between them.</p>
  <p class="hero-line">Choose one <em>to begin.</em></p>

  <button id="enterBtn">Enter the Universe</button>
</div>

<div id="hud">
  <div class="logo">
    <h1>My Whitespace</h1>
    <p>Explore the three dimensions</p>
  </div>

  <div class="label energy" id="label0">
    <div class="cat">Energy</div>
    <div class="name">About Me</div>
  </div>

  <div class="label matter" id="label1">
    <div class="cat">Matter</div>
    <div class="name">My Work</div>
  </div>

  <div class="label fields" id="label2">
    <div class="cat">Fields</div>
    <div class="name">Writing</div>
  </div>
</div>

<div class="panel" id="panel">
  <div class="panelContent">

    <button class="closeBtn" id="closeBtn">
      Return to Universe
    </button>

    <h1 class="panelTitle" id="panelTitle"></h1>

    <div class="panelText" id="panelText"></div>

  </div>
</div>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let w,h;

function resize(){
  w = canvas.width = window.innerWidth;
  h = canvas.height = window.innerHeight;
}

resize();
window.addEventListener("resize",resize);

const overlay = document.getElementById("overlay");
const enterBtn = document.getElementById("enterBtn");

let started = false;

enterBtn.addEventListener("click", enterUniverse);

function enterUniverse(){

  if(started) return;

  started = true;

  overlay.classList.add("hide");

  setTimeout(()=>{
    labels.forEach(l=>l.el.classList.add("show"));
  },2000);
}

const stars = [];

for(let i=0;i<1400;i++){

  stars.push({
    x:(Math.random()-0.5)*4000,
    y:(Math.random()-0.5)*4000,
    z:Math.random()*2000
  });

}

let angle = 0;

const nodes = [

{
  x:-280,
  y:-40,
  r:70,
  color:"#7799ff",
  label:"About Me",
  cat:"Energy",
  content:`
    <p>
      I'm a UI/UX designer with 5+ years of experience and a strong foundation in visual design. I started in graphic design and transitioned into UX to focus on solving real user problems. Currently I work on enterprise SaaS products — designing end-to-end workflows, dashboards that simplify complex data, and communication materials that drive user adoption.
    </p>

    <div class="cards">
      <div class="card">
        <h3>UX Design</h3>
        <p>
          Designing intuitive systems that reduce friction and improve decision making.
        </p>
      </div>

      <div class="card">
        <h3>Visual Systems</h3>
        <p>
          Creating scalable design languages across products and brands.
        </p>
      </div>

      <div class="card">
        <h3>Research</h3>
        <p>
          Turning user insights into meaningful interaction patterns.
        </p>
      </div>
    </div>
  `
},

{
  x:280,
  y:-40,
  r:80,
  color:"#ff6600",
  label:"My Work",
  cat:"Matter",
  content:`
    <p>
      I build interfaces that balance aesthetics, usability,
      and business goals across enterprise and consumer products.
    </p>

    <div class="cards">

      <div class="card">
        <h3>Compliance Command Center</h3>
        <p>
          Enterprise monitoring and reporting dashboard system.
        </p>
      </div>

      <div class="card">
        <h3>Passport Seva Redesign</h3>
        <p>
          Simplifying government service workflows for accessibility.
        </p>
      </div>

      <div class="card">
        <h3>Barclays Dispute Resolution</h3>
        <p>
          Improving dispute management experiences in banking systems.
        </p>
      </div>

    </div>
  `
},

{
  x:0,
  y:260,
  r:75,
  color:"#b36bff",
  label:"Writing",
  cat:"Fields",
  content:`
    <p>
      Writing helps me explore the invisible systems behind design,
      thought, and human behavior.
    </p>

    <div class="cards">

      <div class="card">
        <h3>Whitespace & Thought</h3>
        <p>
          Exploring how absence shapes perception and meaning.
        </p>
      </div>

      <div class="card">
        <h3>Systems & Philosophy</h3>
        <p>
          Understanding interfaces as living structures.
        </p>
      </div>

      <div class="card">
        <h3>Design Process</h3>
        <p>
          Essays on iteration, clarity, and creative momentum.
        </p>
      </div>

    </div>
  `
}

];

const labels = [
  {el:document.getElementById("label0")},
  {el:document.getElementById("label1")},
  {el:document.getElementById("label2")}
];

const panel = document.getElementById("panel");
const panelTitle = document.getElementById("panelTitle");
const panelText = document.getElementById("panelText");

nodes.forEach((node,index)=>{

  labels[index].el.addEventListener("click",()=>{

    panel.classList.add("open");

    panelTitle.innerHTML = node.label;

    panelText.innerHTML = node.content;

  });

});

document.getElementById("closeBtn")
.addEventListener("click",()=>{

  panel.classList.remove("open");

});

function drawStars(){

  ctx.fillStyle="#06050e";
  ctx.fillRect(0,0,w,h);

  stars.forEach(s=>{

    s.z -= 2;

    if(s.z <= 0){
      s.z = 2000;
    }

    const k = 128 / s.z;

    const px = s.x * k + w/2;
    const py = s.y * k + h/2;

    if(px>=0 && px<=w && py>=0 && py<=h){

      const size = (1-s.z/2000)*2;

      ctx.fillStyle="rgba(255,255,255,.8)";
      ctx.beginPath();
      ctx.arc(px,py,size,0,Math.PI*2);
      ctx.fill();

    }

  });

}

function drawConnections(){

  ctx.strokeStyle="rgba(255,255,255,.08)";
  ctx.lineWidth=1;

  for(let i=0;i<nodes.length;i++){

    for(let j=i+1;j<nodes.length;j++){

      const a = nodes[i];
      const b = nodes[j];

      ctx.beginPath();

      ctx.moveTo(w/2+a.x,h/2+a.y);

      ctx.quadraticCurveTo(
        w/2,
        h/2-100,
        w/2+b.x,
        h/2+b.y
      );

      ctx.stroke();

    }

  }

}

function drawNodes(){

  nodes.forEach((node,index)=>{

    const pulse = Math.sin(angle+index)*4;

    const x = w/2 + node.x;
    const y = h/2 + node.y;

    const grad = ctx.createRadialGradient(
      x,y,0,
      x,y,node.r+30+pulse
    );

    grad.addColorStop(0,node.color);
    grad.addColorStop(1,"transparent");

    ctx.beginPath();
    ctx.fillStyle = grad;
    ctx.arc(x,y,node.r+30+pulse,0,Math.PI*2);
    ctx.fill();

    ctx.beginPath();
    ctx.fillStyle=node.color;
    ctx.arc(x,y,node.r,0,Math.PI*2);
    ctx.fill();

    ctx.beginPath();
    ctx.fillStyle="rgba(255,255,255,.9)";
    ctx.arc(x-node.r*.2,y-node.r*.2,node.r*.2,0,Math.PI*2);
    ctx.fill();

    labels[index].el.style.left = x+"px";
    labels[index].el.style.top = (y-node.r-40)+"px";

  });

}

function animate(){

  requestAnimationFrame(animate);

  angle += .01;

  drawStars();

  if(started){

    drawConnections();

    drawNodes();

  }

}

animate();
</script>

</body>
</html>
